name: Deploy leorza.net redirect

on:
  push:
    branches:
      - master
    paths:
      - "redirect-worker/**"
      - ".github/workflows/deploy-redirect.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: redirect-worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: redirect-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate Worker config
        run: npx wrangler deploy --dry-run

      - name: Deploy redirect Worker
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
